name: Low Stock Digest

# Weekly low-stock digest for internal stock alert recipients.
# 05:00 UTC Monday = 07:00 SAST Monday
# (Staggered 1 hour after Brand Owner Digest to avoid D1 contention.)
on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  fire-low-stock-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fire low-stock digest webhook
        env:
          TOKEN: ${{ secrets.LOW_STOCK_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::LOW_STOCK_WEBHOOK_TOKEN secret is not set."
            exit 1
          fi
          set -e
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://bwprodsystem.co.za/api/cron/low-stock-digest" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"reason":"github-actions-weekly"}')
          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $STATUS"
          echo "Response: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Low-stock digest webhook returned $STATUS"
            exit 1
          fi
          echo "Low-stock digest fired successfully."
